version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: better-auth-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - better-auth-network
    env_file:
      - .env

volumes:
  postgres_data:

networks:
  better-auth-network:
    driver: bridge
